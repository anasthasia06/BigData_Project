name: CI/CD and Deploy

on:
	pull_request:
		branches: [main]
	push:
		branches: [main]
	workflow_dispatch:

jobs:
	test:
		runs-on: ubuntu-latest
		steps:
			- name: Checkout
				uses: actions/checkout@v4

			- name: Setup Python
				uses: actions/setup-python@v5
				with:
					python-version: "3.11"

			- name: Install dependencies
				run: |
					python -m pip install --upgrade pip
					pip install -r services/api/requirements.txt
					pip install -r services/frontend/requirements.txt
					pip install pytest

			- name: Run API tests
				run: PYTHONPATH=. pytest tests/services_tests/api -q

			- name: Run Frontend tests
				run: PYTHONPATH=. pytest tests/services_tests/frontend -q

			- name: Run pipeline tests
				run: PYTHONPATH=. pytest tests/pipelines_tests -q

	docker-build:
		runs-on: ubuntu-latest
		needs: test
		if: github.event_name != 'pull_request'
		steps:
			- name: Checkout
				uses: actions/checkout@v4

			- name: Build API image
				run: docker build -f services/api/Dockerfile -t steam-api:ci .

			- name: Build Frontend image
				run: docker build -f services/frontend/Dockerfile -t steam-frontend:ci .

	deploy-render:
		runs-on: ubuntu-latest
		needs: docker-build
		if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
		steps:
			- name: Trigger API deploy hook
				if: ${{ secrets.RENDER_API_DEPLOY_HOOK != '' }}
				run: curl -fsS -X POST "${{ secrets.RENDER_API_DEPLOY_HOOK }}"

			- name: Trigger Frontend deploy hook
				if: ${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK != '' }}
				run: curl -fsS -X POST "${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK }}"
