services:
  - type: web
    name: steam-api
    env: docker
    dockerfilePath: services/api/Dockerfile
    plan: free
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: ELASTIC_URI
        value: https://your-elasticsearch-host
      - key: ELASTIC_INDEX
        value: steam_games
      - key: MODEL_PATH
        value: /data/BigData_Project/models/recommender.pkl
      # Metrics Endpoint auth for Grafana Cloud (required by Metrics Endpoint integration)
      - key: METRICS_AUTH_MODE
        value: basic
      - key: METRICS_BASIC_USERNAME
        value: grafana-scraper
      - key: METRICS_BASIC_PASSWORD
        sync: false

  - type: web
    name: steam-frontend
    env: docker
    dockerfilePath: services/frontend/Dockerfile
    plan: free
    autoDeploy: true
    envVars:
      - key: API_URL
        value: https://steam-api.onrender.com
